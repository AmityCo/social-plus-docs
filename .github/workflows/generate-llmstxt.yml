name: Generate llms.txt

on:
  push:
    branches: [main]
    paths:
      - '**/*.mdx'
      - 'llmstxt/llms-config.yml'
  workflow_dispatch: {}

concurrency:
  group: generate-llmstxt
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: llmstxt/go.mod
          cache-dependency-path: llmstxt/go.sum

      - name: Generate llms.txt and llms-full.txt
        run: |
          cd llmstxt
          go run ./cmd/main.go -verbose

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet llms.txt llms-full.txt; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to llms.txt or llms-full.txt — skipping PR."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git diff --stat llms.txt llms-full.txt
          fi

      - name: Create or update PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto/generate-llmstxt"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git add llms.txt llms-full.txt
          git commit -m "docs: regenerate llms.txt and llms-full.txt"
          git push --force origin "$BRANCH"

          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --title "docs: regenerate llms.txt and llms-full.txt" \
              --body "Auto-generated by the llmstxt workflow after docs changes merged to main. Review the diff and merge when ready." \
              --head "$BRANCH"
            echo "PR created."
          else
            echo "PR #$EXISTING already exists — updated with latest changes."
          fi
