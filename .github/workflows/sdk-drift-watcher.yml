name: SDK Drift Watcher

on:
  schedule:
    - cron: '0 8 * * *'   # daily 8am UTC
  workflow_dispatch:        # also manually triggerable

concurrency:
  group: sdk-drift-watcher
  cancel-in-progress: false  # don't stomp on a running bot

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout AmityTypescriptSDK
        uses: actions/checkout@v4
        with:
          repository: AmityCo/AmityTypescriptSDK
          path: ../AmityTypescriptSDK
          # token: ${{ secrets.SDK_READ_PAT }}  # uncomment if repo is private

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run PR-bot (TypeScript)
        env:
          # Points the extractor at the checked-out SDK sibling
          SP_SDKS_ROOT: ${{ github.workspace }}/..
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .docs-ops/pr-bot/auto-update-from-sdk.py --platform typescript
