# Docs-ops drift gate.
#
# This is a SHARED hook config. Once a contributor runs `pre-commit install`
# (one-time), the gate runs automatically on `git push` and blocks pushes that
# introduce new docs-accuracy drift against origin/main.
#
# Why pre-push and not pre-commit:
#   - The drift check compares against `origin/main`, which takes a few seconds.
#   - Pre-commit would run on every WIP commit and slow the inner loop.
#   - Pre-push runs once per push, gates the moment that matters.
#
# Install:
#   pip install pre-commit
#   pre-commit install --hook-type pre-push
#
# Bypass (use sparingly — for legitimate exceptions, document why):
#   git push --no-verify

repos:
  - repo: local
    hooks:
      - id: docs-ops-mdx-validity
        name: docs-ops MDX validity (Mintlify build-breakers)
        entry: python3 .docs-ops/ci/check-mdx.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
        description: |
          Catches unterminated code fences and unbalanced JSX component tags
          (Accordion/Tabs/CardGroup/...) that break the Mintlify build. Pure
          Python, no SDK or network needed — runs in well under a second.

      - id: docs-ops-drift-check
        name: docs-ops drift check (TS accuracy)
        entry: python3 .docs-ops/ci/check-drift.py --quiet
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
        description: |
          Compares TS docs-accuracy drift against origin/main. Blocks the push
          if any new (file, API-ref) pair was introduced — even if total drift
          count is flat or lower. See .docs-ops/CI_GATE.md for the rationale.
